name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: php -l (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.0', '8.2', '8.4']
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: bcmath, gmp, gd
          coverage: none
      - name: Lint all PHP files
        run: |
          set -e
          find . -name '*.php' -not -path './.git/*' -print0 \
            | xargs -0 -n1 -P4 php -l > /dev/null
          echo "all files lint clean"

  compat:
    name: PHPCompatibility (7.4+)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
      - name: Install PHPCompatibility
        run: |
          composer init --quiet --name nomiddleman/compat-scan
          composer config minimum-stability dev
          composer config prefer-stable true
          composer config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer require --quiet --dev squizlabs/php_codesniffer:^4 phpcompatibility/php-compatibility:10.x-dev
      - name: Scan plugin code
        run: vendor/bin/phpcs -p

  hd-derivation:
    name: HD address derivation (offline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: bcmath, gmp
          coverage: none
      - name: Derive against known-good BIP32 addresses (GMP + BCMATH)
        run: php tests/test-hd-derivation.php

  qr-rendering:
    name: QR rendering (offline + decode)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: gd
          coverage: none
      - name: Install QR decoder
        run: sudo apt-get update -q && sudo apt-get install -y -q zbar-tools
      - name: Generate and decode payment QR codes
        run: php tests/test-qr.php

  solana-sweep:
    name: Solana sweep/budget (offline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
      - name: Offline Solana deep-sweep, budget and cursor tests
        run: php tests/test-sol-pagination.php
      - name: Monero RPC URL SSRF-guard tests
        run: php tests/test-monero-url.php
      - name: Settings bounds (server-side clamping) tests
        run: php tests/test-settings-bounds.php

  db-integration:
    name: Autopay + retry queue (WordPress + WooCommerce + MariaDB)
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:10.6
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: wordpress
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s --health-timeout=5s --health-retries=15
    steps:
      - uses: actions/checkout@v5
        with:
          path: plugin
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mysqli
          coverage: none
      - name: Install WP-CLI
        run: |
          curl -sSL -o /usr/local/bin/wp https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
          chmod +x /usr/local/bin/wp
      - name: Install WordPress
        run: |
          wp core download --path=wp --version=latest
          wp config create --path=wp --dbname=wordpress --dbuser=root --dbpass=root --dbhost=127.0.0.1:3306
          wp core install --path=wp --url=http://localhost --title=CI \
            --admin_user=admin --admin_password=admin --admin_email=ci@example.com --skip-email
      - name: Install WooCommerce and activate the plugin
        run: |
          wp plugin install woocommerce --activate --path=wp
          ln -s "$GITHUB_WORKSPACE/plugin" wp/wp-content/plugins/nomiddleman-crypto-payments-for-woocommerce
          wp plugin activate nomiddleman-crypto-payments-for-woocommerce --path=wp
      - name: Durable Solana retry queue test (must run, not skip)
        run: |
          OUT=$(wp eval-file "$GITHUB_WORKSPACE/plugin/tests/test-sol-retry.php" --path=wp 2>&1)
          echo "$OUT"
          echo "$OUT" | grep -q "test-sol-retry: skipped" && { echo "::error::retry test skipped"; exit 1; } || true
          echo "$OUT" | grep -q "SOL-RETRY (durable queue) CHECKS PASSED" || { echo "::error::retry test did not pass"; exit 1; }
      - name: Autopay expiry vs order-status test (must run, not skip)
        run: |
          OUT=$(wp eval-file "$GITHUB_WORKSPACE/plugin/tests/test-autopay-cancel.php" --path=wp 2>&1)
          echo "$OUT"
          echo "$OUT" | grep -q "test-autopay-cancel: skipped" && { echo "::error::autopay test skipped"; exit 1; } || true
          echo "$OUT" | grep -q "AUTOPAY-CANCEL CHECKS PASSED" || { echo "::error::autopay test did not pass"; exit 1; }
      - name: Bounded Autopay scan (budget + fair cursor + Monero batch) test (must run, not skip)
        run: |
          OUT=$(wp eval-file "$GITHUB_WORKSPACE/plugin/tests/test-autopay-scan.php" --path=wp 2>&1)
          echo "$OUT"
          echo "$OUT" | grep -q "test-autopay-scan: skipped" && { echo "::error::scan test skipped"; exit 1; } || true
          echo "$OUT" | grep -q "AUTOPAY-SCAN CHECKS PASSED" || { echo "::error::scan test did not pass"; exit 1; }
      - name: Per-order initialization lock test (must run, not skip)
        run: |
          OUT=$(wp eval-file "$GITHUB_WORKSPACE/plugin/tests/test-order-init-lock.php" --path=wp 2>&1)
          echo "$OUT"
          echo "$OUT" | grep -q "test-order-init-lock: skipped" && { echo "::error::order-init-lock test skipped"; exit 1; } || true
          echo "$OUT" | grep -q "ORDER-INIT-LOCK CHECKS PASSED" || { echo "::error::order-init-lock test did not pass"; exit 1; }
      - name: Carousel atomic allocation test (must run, not skip)
        run: |
          OUT=$(wp eval-file "$GITHUB_WORKSPACE/plugin/tests/test-carousel.php" --path=wp 2>&1)
          echo "$OUT"
          echo "$OUT" | grep -q "test-carousel: skipped" && { echo "::error::carousel test skipped"; exit 1; } || true
          echo "$OUT" | grep -q "CAROUSEL CHECKS PASSED" || { echo "::error::carousel test did not pass"; exit 1; }
      - name: Privacy Mode (HD) verify vs order-status test (must run, not skip)
        run: |
          OUT=$(wp eval-file "$GITHUB_WORKSPACE/plugin/tests/test-hd-verify.php" --path=wp 2>&1)
          echo "$OUT"
          echo "$OUT" | grep -q "test-hd-verify: skipped" && { echo "::error::hd-verify test skipped"; exit 1; } || true
          echo "$OUT" | grep -q "HD-VERIFY CHECKS PASSED" || { echo "::error::hd-verify test did not pass"; exit 1; }
